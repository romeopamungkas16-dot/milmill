<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk MILA ❤️</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  text-align:center;
  color:#333;
}

.container{
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

img{
  width:200px;
  border-radius:15px;
}

button{
  margin-top:15px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#ff6b81;
  color:white;
}

.hidden{display:none}

.grid{
  margin-top:15px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.grid img{
  width:100%;
  height:120px;
  object-fit:cover;
  cursor:pointer;
}

/* modal */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal img{
  max-width:90%;
  border-radius:10px;
}

/* typing */
.typing{
  border-right:2px solid;
  display:inline-block;
  overflow:hidden;
  white-space:nowrap;
  animation:typing 3s steps(20) forwards,blink .7s infinite;
}

@keyframes typing{
  from{width:0}
  to{width:100%}
}

@keyframes blink{
  50%{border-color:transparent}
}
</style>
</head>
<body>

<div class="container">

<!-- HALAMAN 1 -->
<div class="card" id="page1">
  <h2 class="typing">Untuk MILA ❤️</h2>
  <p>
  Semangat ya MILA 🤍<br>
  Aku tau kamu lagi berjuang buat LSP besok.<br>
  Kamu pasti bisa! ✨<br>
  Semoga lancar yaa 💖<br>
  Aku bangga sama kamu 🫶
  </p>

  <img src="foto1.jpg"><br>
  <button onclick="nextPage()">Klik aku 💌</button>
</div>

<!-- HALAMAN 2 -->
<div class="card hidden" id="page2">
  <h3>Kenangan Kita 📸</h3>

  <!-- slideshow -->
  <img id="slide" src="foto1.jpg"><br>

  <div class="grid">
    <img src="foto1.jpg" onclick="openModal(this.src)">
    <img src="foto2.jpg" onclick="openModal(this.src)">
    <img src="foto3.jpg" onclick="openModal(this.src)">
    <img src="foto4.jpg" onclick="openModal(this.src)">
  </div>

  <button onclick="backPage()">Kembali 💖</button>
</div>

</div>

<!-- modal -->
<div id="modal" class="modal hidden" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>
function nextPage(){
  document.getElementById('page1').classList.add('hidden');
  document.getElementById('page2').classList.remove('hidden');
}

function backPage(){
  document.getElementById('page2').classList.add('hidden');
  document.getElementById('page1').classList.remove('hidden');
}

// slideshow sederhana
const images=['foto1.jpg','foto2.jpg','foto3.jpg','foto4.jpg'];
let i=0;
setInterval(()=>{
  i=(i+1)%images.length;
  document.getElementById('slide').src=images[i];
},2000);

function openModal(src){
  document.getElementById('modal').classList.remove('hidden');
  document.getElementById('modalImg').src=src;
}

function closeModal(){
  document.getElementById('modal').classList.add('hidden');
}
</script>

</body>
</html>
