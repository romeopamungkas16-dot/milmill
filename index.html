<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk MILA ❤️</title>
<style>
body{margin:0;font-family:sans-serif;background:linear-gradient(to right,#ff9a9e,#fad0c4);display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
.card,.gallery{background:white;padding:20px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,0.2);text-align:center;max-width:400px}
.hidden{display:none}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.grid img{width:100%;height:120px;object-fit:cover;border-radius:10px;cursor:pointer}
.typing{border-right:2px solid;white-space:nowrap;overflow:hidden;width:0;animation:typing 3s steps(20) forwards,blink .7s infinite}
@keyframes typing{from{width:0}to{width:100%}}
@keyframes blink{50%{border-color:transparent}}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:flex;justify-content:center;align-items:center}
.modal img{max-width:90%;max-height:80%}
</style>
</head>
<body>

<div class="card" id="page1">
<img src="foto1.jpg">
<h1 class="typing">Untuk MILA ❤️</h1>
<p>Semangat ya MILA 🤍<br>
Aku tau kamu lagi berjuang buat LSP besok.<br>
Santai aja, kamu pasti bisa!<br>
Aku selalu doain yang terbaik buat kamu ✨<br>
Semoga lancar yaa 💖<br>
Aku bangga sama kamu 🫶</p>
<button onclick="nextPage()">Klik aku 💌</button>
</div>

<div class="gallery hidden" id="page2">
<h1>Kenangan Kita 📸</h1>
<img id="slide" src="foto1.jpg">
<div class="grid">
<img src="foto1.jpg" onclick="openModal(this.src)">
<img src="foto2.jpg" onclick="openModal(this.src)">
<img src="foto3.jpg" onclick="openModal(this.src)">
<img src="foto4.jpg" onclick="openModal(this.src)">
</div>
<button onclick="backPage()">Kembali 💖</button>
</div>

<div id="modal" class="modal hidden" onclick="this.classList.add('hidden')">
<img id="modalImg">
</div>

<script>
function nextPage(){page1.classList.add('hidden');page2.classList.remove('hidden')}
function backPage(){page2.classList.add('hidden');page1.classList.remove('hidden')}

const imgs=["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg"];
let i=0;
setInterval(()=>{i=(i+1)%imgs.length;slide.src=imgs[i]},2000);

function openModal(src){modal.classList.remove('hidden');modalImg.src=src}
</script>

</body>
</html>
